<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230ea5e9'/><path d='M30 55L45 70L70 35' stroke='white' stroke-width='10' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #09090b;
            --bg-secondary: #18181b;
            --bg-tertiary: #27272a;
            --bg-elevated: #1c1c1f;
            --border: #2e2e33;
            --border-hover: #3f3f46;
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --text-tertiary: #71717a;
            --accent: #0ea5e9;
            --accent-muted: rgba(14, 165, 233, 0.12);
            --green: #22c55e;
            --green-muted: rgba(34, 197, 94, 0.12);
            --green-subtle: rgba(34, 197, 94, 0.06);
            --red: #ef4444;
            --red-muted: rgba(239, 68, 68, 0.12);
            --amber: #f59e0b;
            --amber-muted: rgba(245, 158, 11, 0.12);
            --radius: 10px;
            --radius-sm: 6px;
            --shadow: 0 1px 2px rgba(0,0,0,0.4);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
            --mono: 'JetBrains Mono', monospace;
            --sans: 'Inter', -apple-system, system-ui, sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 14px; }
        body {
            font-family: var(--sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Top Nav ── */
        .topnav {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(9, 9, 11, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
        }
        .topnav-inner {
            max-width: 1280px;
            margin: 0 auto;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 15px;
            letter-spacing: -0.3px;
        }
        .brand-mark {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .brand-mark svg { width: 16px; height: 16px; }
        .nav-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .nav-time {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text-tertiary);
            padding: 4px 10px;
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }
        .nav-btn {
            height: 32px;
            padding: 0 12px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-size: 12px;
            font-family: var(--sans);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .nav-btn:hover { border-color: var(--border-hover); color: var(--text-primary); }
        .nav-toggle { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-tertiary); }
        .nav-toggle input { accent-color: var(--accent); width: 14px; height: 14px; }

        /* ── Metric Strip ── */
        .metric-strip {
            max-width: 1280px;
            margin: 1.5rem auto 0;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            background: var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .metric {
            background: var(--bg-secondary);
            padding: 1.25rem 1.5rem;
        }
        .metric-label {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 6px;
        }
        .metric-row {
            display: flex;
            align-items: baseline;
            gap: 6px;
        }
        .metric-value {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -1px;
            line-height: 1;
        }
        .metric-unit {
            font-size: 12px;
            color: var(--text-tertiary);
        }
        .metric-value.healthy { color: var(--green); }
        .metric-value.info { color: var(--accent); }

        /* ── Container ── */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1.5rem 2rem 3rem;
        }

        /* ── Section ── */
        .section { margin-bottom: 2rem; }
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }
        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .section-count {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-tertiary);
            background: var(--bg-tertiary);
            padding: 2px 8px;
            border-radius: 4px;
        }

        /* ── App Table ── */
        .app-table {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }
        .app-row {
            display: grid;
            grid-template-columns: minmax(0, 1.2fr) 80px 100px minmax(0, 1fr) 60px 100px 170px;
            align-items: center;
            padding: 0 1.25rem;
            height: 60px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-secondary);
            transition: background 0.15s;
        }
        .app-row:last-child { border-bottom: none; }
        .app-row:hover { background: var(--bg-elevated); }
        .app-row-head {
            height: 40px;
            background: var(--bg-tertiary);
            font-size: 11px;
            font-weight: 600;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .app-name-cell {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .app-name {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-primary);
        }
        .app-path {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-tertiary);
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            width: fit-content;
        }
        .status-pill .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .status-running {
            background: var(--green-muted);
            color: var(--green);
        }
        .status-running .dot {
            background: var(--green);
            box-shadow: 0 0 6px var(--green);
        }
        .status-stopped {
            background: var(--red-muted);
            color: var(--red);
        }
        .status-stopped .dot { background: var(--red); }
        .status-idle {
            background: var(--amber-muted);
            color: var(--amber);
        }
        .status-idle .dot { background: var(--amber); }

        .app-image {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-tertiary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .app-size {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text-secondary);
        }
        .app-uptime {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text-secondary);
        }
        .app-actions-cell {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            align-items: center;
        }
        .action-divider {
            width: 1px;
            height: 20px;
            background: var(--border);
            flex-shrink: 0;
        }
        .link-btn {
            height: 28px;
            padding: 0 10px;
            border-radius: var(--radius-sm);
            font-size: 11px;
            font-weight: 500;
            font-family: var(--sans);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            transition: all 0.15s;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            background: transparent;
        }
        .link-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-muted);
        }
        .link-btn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        .link-btn.primary:hover {
            background: #0284c7;
        }

        /* ── Infra Grid ── */
        .infra-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .infra-chip {
            padding: 5px 12px;
            border-radius: var(--radius-sm);
            font-family: var(--mono);
            font-size: 11px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: border-color 0.15s;
        }
        .infra-chip:hover { border-color: var(--border-hover); }
        .infra-chip .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }
        .dot-on { background: var(--green); box-shadow: 0 0 4px rgba(34,197,94,0.4); }
        .dot-off { background: var(--red); }

        /* ── Control Buttons ── */
        .ctrl-group {
            display: flex;
            gap: 4px;
        }
        .ctrl-btn {
            height: 28px;
            width: 28px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-tertiary);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            position: relative;
        }
        .ctrl-btn:hover {
            border-color: var(--border-hover);
            color: var(--text-primary);
            background: var(--bg-tertiary);
        }
        .ctrl-btn.ctrl-stop:hover { border-color: var(--red); color: var(--red); background: var(--red-muted); }
        .ctrl-btn.ctrl-start:hover { border-color: var(--green); color: var(--green); background: var(--green-muted); }
        .ctrl-btn.ctrl-restart:hover { border-color: var(--amber); color: var(--amber); background: var(--amber-muted); }
        .ctrl-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .ctrl-btn:disabled:hover { border-color: var(--border); color: var(--text-tertiary); background: transparent; }
        .ctrl-btn svg { width: 14px; height: 14px; }
        .ctrl-btn .spinner-sm {
            width: 12px; height: 12px;
            border: 1.5px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        .ctrl-tooltip {
            position: absolute;
            bottom: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 4px;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s;
        }
        .ctrl-btn:hover .ctrl-tooltip { opacity: 1; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 10px 18px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 500;
            z-index: 100;
            animation: slideUp 0.3s ease;
            border: 1px solid;
        }
        .toast-ok { background: var(--green-muted); color: var(--green); border-color: rgba(34,197,94,0.3); }
        .toast-err { background: var(--red-muted); color: var(--red); border-color: rgba(239,68,68,0.3); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ── Slide Panel ── */
        .panel-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200;
            opacity: 0; pointer-events: none; transition: opacity 0.2s;
        }
        .panel-overlay.open { opacity: 1; pointer-events: auto; }
        .panel {
            position: fixed; top: 0; right: 0; bottom: 0; width: min(680px, 90vw); z-index: 201;
            background: var(--bg-primary); border-left: 1px solid var(--border);
            transform: translateX(100%); transition: transform 0.25s ease;
            display: flex; flex-direction: column;
        }
        .panel.open { transform: translateX(0); }
        .panel-head {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .panel-title { font-weight: 600; font-size: 15px; }
        .panel-close {
            width: 32px; height: 32px; border-radius: var(--radius-sm);
            border: 1px solid var(--border); background: transparent;
            color: var(--text-secondary); cursor: pointer; font-size: 16px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
        }
        .panel-close:hover { border-color: var(--red); color: var(--red); }
        .panel-tabs {
            display: flex; border-bottom: 1px solid var(--border);
            flex-shrink: 0; padding: 0 20px;
        }
        .panel-tab {
            padding: 10px 16px; font-size: 12px; font-weight: 500;
            color: var(--text-tertiary); cursor: pointer; border: none; background: none;
            border-bottom: 2px solid transparent; transition: all 0.15s;
            font-family: var(--sans);
        }
        .panel-tab:hover { color: var(--text-secondary); }
        .panel-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
        .panel-body {
            flex: 1; overflow-y: auto; padding: 20px;
        }
        .panel-body pre {
            font-family: var(--mono); font-size: 11px; line-height: 1.6;
            color: var(--text-secondary); white-space: pre-wrap; word-break: break-all;
            margin: 0;
        }
        /* Log controls */
        .log-controls {
            display: flex; gap: 8px; margin-bottom: 12px; align-items: center;
        }
        .log-controls select, .log-controls button {
            height: 30px; padding: 0 10px; border-radius: var(--radius-sm);
            border: 1px solid var(--border); background: var(--bg-secondary);
            color: var(--text-secondary); font-size: 11px; font-family: var(--sans);
            cursor: pointer;
        }
        .log-controls button:hover { border-color: var(--accent); color: var(--accent); }
        /* Inspect sections */
        .insp-section { margin-bottom: 16px; }
        .insp-label {
            font-size: 10px; font-weight: 600; color: var(--text-tertiary);
            text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
        }
        .insp-table {
            width: 100%; font-size: 12px; border-collapse: collapse;
        }
        .insp-table td {
            padding: 4px 8px; border-bottom: 1px solid var(--border);
            vertical-align: top;
        }
        .insp-table td:first-child {
            font-family: var(--mono); color: var(--text-tertiary);
            width: 120px; font-size: 11px;
        }
        .insp-table td:last-child { font-family: var(--mono); color: var(--text-secondary); word-break: break-all; }
        /* Exec */
        .exec-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 6px; margin-bottom: 16px;
        }
        .exec-btn {
            padding: 8px; border-radius: var(--radius-sm); border: 1px solid var(--border);
            background: var(--bg-secondary); color: var(--text-secondary);
            font-family: var(--mono); font-size: 11px; cursor: pointer;
            transition: all 0.15s; text-align: center;
        }
        .exec-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-muted); }
        .exec-btn.active { border-color: var(--accent); color: var(--accent); }
        .exec-output {
            background: var(--bg-secondary); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 12px; min-height: 200px;
        }

        /* ── Undeployed ── */
        .undeployed-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 12px;
        }
        .undeployed-card {
            background: var(--bg-secondary);
            border: 1px dashed var(--border);
            border-radius: var(--radius);
            padding: 1rem 1.25rem;
        }
        .undeployed-name {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }
        .undeployed-meta {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-tertiary);
            line-height: 1.6;
        }

        /* ── Loading ── */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 240px;
            color: var(--text-tertiary);
            font-size: 13px;
        }
        .loader {
            width: 18px;
            height: 18px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-right: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Footer ── */
        .footer {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1rem 2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: var(--text-tertiary);
            border-top: 1px solid var(--border);
        }
        .footer a {
            color: var(--text-tertiary);
            text-decoration: none;
            transition: color 0.15s;
        }
        .footer a:hover { color: var(--accent); }

        /* ── Responsive ── */
        @media (max-width: 900px) {
            .metric-strip { grid-template-columns: repeat(2, 1fr); }
            .app-row { grid-template-columns: minmax(0,1.2fr) 80px 100px 100px 170px; height: auto; padding: 12px 16px; }
            .app-row-head .hide-mobile, .app-row .hide-mobile { display: none; }
        }
        @media (max-width: 600px) {
            .metric-strip { grid-template-columns: 1fr 1fr; }
            .app-row { grid-template-columns: 1fr 80px 100px; }
            .topnav { padding: 0 1rem; }
            .container, .footer { padding-left: 1rem; padding-right: 1rem; }
        }
    </style>
</head>
<body>
    <nav class="topnav">
        <div class="topnav-inner">
            <div class="brand">
                <div class="brand-mark">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7" rx="1"/>
                        <rect x="14" y="3" width="7" height="7" rx="1"/>
                        <rect x="3" y="14" width="7" height="7" rx="1"/>
                        <rect x="14" y="14" width="7" height="7" rx="1"/>
                    </svg>
                </div>
                Dashboard
            </div>
            <div class="nav-actions">
                <span class="nav-time" id="timestamp">--</span>
                <label class="nav-toggle">
                    <input type="checkbox" id="autoRefresh" checked>
                    Auto 30s
                </label>
                <button class="nav-btn" onclick="loadDashboard()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12a9 9 0 11-2.636-6.364"/><polyline points="21 3 21 9 15 9"/></svg>
                    Refresh
                </button>
            </div>
        </div>
    </nav>

    <div class="metric-strip" id="metricStrip">
        <div class="metric"><div class="metric-label">Deployed</div><div class="metric-row"><span class="metric-value info" id="mApps">-</span></div></div>
        <div class="metric"><div class="metric-label">Running</div><div class="metric-row"><span class="metric-value healthy" id="mRunning">-</span><span class="metric-unit">healthy</span></div></div>
        <div class="metric"><div class="metric-label">Containers</div><div class="metric-row"><span class="metric-value" id="mTotal">-</span><span class="metric-unit">total</span></div></div>
        <div class="metric"><div class="metric-label">Harbor Images</div><div class="metric-row"><span class="metric-value info" id="mImages">-</span><span class="metric-unit">repos</span></div></div>
    </div>

    <div class="container" id="content">
        <div class="loading"><div class="loader"></div>Loading dashboard...</div>
    </div>

    <div class="footer">
        <span>Hermes Platform</span>
        <a href="" id="harborLink" target="_blank">Harbor Registry</a>
    </div>

    <!-- Detail Panel -->
    <div class="panel-overlay" id="panelOverlay" onclick="closePanel()"></div>
    <div class="panel" id="panel">
        <div class="panel-head">
            <span class="panel-title" id="panelTitle">container</span>
            <button class="panel-close" onclick="closePanel()">&times;</button>
        </div>
        <div class="panel-tabs" id="panelTabs">
            <button class="panel-tab active" data-tab="logs" onclick="switchTab('logs')">Logs</button>
            <button class="panel-tab" data-tab="inspect" onclick="switchTab('inspect')">Inspect</button>
            <button class="panel-tab" data-tab="exec" onclick="switchTab('exec')">Exec</button>
        </div>
        <div class="panel-body" id="panelBody"></div>
    </div>

    <script>
    let refreshTimer = null;

    async function loadDashboard() {
        try {
            const base = window.location.pathname.replace(/\/$/, '');
            const resp = await fetch(base + '/api/dashboard');
            const data = await resp.json();
            render(data);
        } catch (e) {
            document.getElementById('content').innerHTML =
                `<div class="loading" style="color:var(--red)">Failed to load: ${e.message}</div>`;
        }
    }

    function render(data) {
        document.getElementById('mApps').textContent = data.apps.length;
        document.getElementById('mRunning').textContent = data.apps.filter(a => a.status === 'running').length;
        document.getElementById('mTotal').textContent = data.system.total;
        document.getElementById('mImages').textContent = data.apps.length + data.undeployed.length;
        document.getElementById('timestamp').textContent = data.timestamp;
        document.getElementById('harborLink').href = data.harbor_url;

        let h = '';

        // ── Apps Table ──
        if (data.apps.length) {
            h += `<div class="section">
                <div class="section-header">
                    <span class="section-title">Deployed Applications</span>
                    <span class="section-count">${data.apps.length}</span>
                </div>
                <div class="app-table">
                    <div class="app-row app-row-head">
                        <div>Application</div>
                        <div>Status</div>
                        <div>Controls</div>
                        <div class="hide-mobile">Image</div>
                        <div class="hide-mobile">Size</div>
                        <div>Uptime</div>
                        <div style="text-align:right">Actions</div>
                    </div>`;

            for (const app of data.apps) {
                const sc = app.status === 'running' ? 'status-running' : 'status-stopped';
                const st = app.status === 'running' ? 'Running' : 'Stopped';
                const hb = app.harbor;
                const sizeText = hb ? `${hb.size_mb} MB` : '-';
                const imgShort = app.image.split('/').pop();

                h += `
                <div class="app-row">
                    <div class="app-name-cell">
                        <span class="app-name">${app.name}</span>
                        <span class="app-path">${app.url_path}</span>
                    </div>
                    <div><span class="status-pill ${sc}"><span class="dot"></span>${st}</span></div>
                    <div class="ctrl-group">
                        <button class="ctrl-btn ctrl-stop" onclick="ctrlContainer('${app.container}','stop',this)" ${app.status !== 'running' ? 'disabled' : ''}>
                            <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
                            <span class="ctrl-tooltip">Stop</span>
                        </button>
                        <button class="ctrl-btn ctrl-start" onclick="ctrlContainer('${app.container}','start',this)" ${app.status === 'running' ? 'disabled' : ''}>
                            <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="8,5 19,12 8,19"/></svg>
                            <span class="ctrl-tooltip">Start</span>
                        </button>
                        <button class="ctrl-btn ctrl-restart" onclick="ctrlContainer('${app.container}','restart',this)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12a9 9 0 11-2.636-6.364"/><polyline points="21 3 21 9 15 9"/></svg>
                            <span class="ctrl-tooltip">Restart</span>
                        </button>
                    </div>
                    <div class="app-image hide-mobile" title="${app.image}">${imgShort}</div>
                    <div class="app-size hide-mobile">${sizeText}</div>
                    <div class="app-uptime">${app.uptime || '-'}</div>
                    <div class="app-actions-cell">
                        <button class="link-btn" onclick="openPanel('${app.container}')">Detail</button>
                        <a href="${app.url}" target="_blank" class="link-btn primary">Open</a>
                        <a href="${data.harbor_url}/harbor/projects/1/repositories/${app.harbor_name || app.name}" target="_blank" class="link-btn">Harbor</a>
                    </div>
                </div>`;
            }
            h += '</div></div>';
        }

        // ── Undeployed ──
        if (data.undeployed.length) {
            h += `<div class="section">
                <div class="section-header">
                    <span class="section-title">Undeployed Images</span>
                    <span class="section-count">${data.undeployed.length}</span>
                </div>
                <div class="undeployed-grid">`;
            for (const img of data.undeployed) {
                h += `
                <div class="undeployed-card">
                    <div class="undeployed-name">${img.name}</div>
                    <div class="undeployed-meta">
                        ${img.size_mb} MB &middot; ${img.tag_count} tags<br>
                        pushed ${fmtTime(img.push_time)}
                    </div>
                </div>`;
            }
            h += '</div></div>';
        }

        // ── Infra ──
        if (data.system.infra && data.system.infra.length) {
            h += `<div class="section">
                <div class="section-header">
                    <span class="section-title">Infrastructure</span>
                    <span class="section-count">${data.system.infra_count}</span>
                </div>
                <div class="infra-grid">`;
            for (const c of data.system.infra) {
                const dc = c.status === 'running' ? 'dot-on' : 'dot-off';
                h += `<div class="infra-chip"><span class="dot ${dc}"></span>${c.name}</div>`;
            }
            h += '</div></div>';
        }

        document.getElementById('content').innerHTML = h;
    }

    function fmtTime(iso) {
        if (!iso) return '-';
        try {
            return new Date(iso).toLocaleString('ko-KR', {
                timeZone: 'Asia/Seoul', month: 'short', day: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        } catch { return iso; }
    }

    function setupAutoRefresh() {
        const cb = document.getElementById('autoRefresh');
        const go = () => {
            if (refreshTimer) clearInterval(refreshTimer);
            if (cb.checked) refreshTimer = setInterval(loadDashboard, 30000);
        };
        cb.addEventListener('change', go);
        go();
    }

    // ── Container Control ──
    async function ctrlContainer(name, action, btn) {
        const origHTML = btn.innerHTML;
        btn.innerHTML = '<span class="spinner-sm"></span>';
        btn.disabled = true;

        try {
            const base = window.location.pathname.replace(/\/$/, '');
            const resp = await fetch(`${base}/api/containers/${name}/${action}`, { method: 'POST' });
            const data = await resp.json();
            if (data.ok) {
                toast(`${name}: ${action} OK`, false);
                setTimeout(loadDashboard, 500);
            } else {
                toast(`${name}: ${data.error}`, true);
                btn.innerHTML = origHTML;
                btn.disabled = false;
            }
        } catch (e) {
            toast(`Error: ${e.message}`, true);
            btn.innerHTML = origHTML;
            btn.disabled = false;
        }
    }

    function toast(msg, isErr) {
        const el = document.createElement('div');
        el.className = `toast ${isErr ? 'toast-err' : 'toast-ok'}`;
        el.textContent = msg;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 3000);
    }

    // ── Detail Panel ──
    let currentContainer = '';
    let currentTab = 'logs';
    const BASE = () => window.location.pathname.replace(/\/$/, '');

    function openPanel(container) {
        currentContainer = container;
        document.getElementById('panelTitle').textContent = container;
        document.getElementById('panelOverlay').classList.add('open');
        document.getElementById('panel').classList.add('open');
        switchTab('logs');
    }

    function closePanel() {
        document.getElementById('panelOverlay').classList.remove('open');
        document.getElementById('panel').classList.remove('open');
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.panel-tab').forEach(t => {
            t.classList.toggle('active', t.dataset.tab === tab);
        });
        const body = document.getElementById('panelBody');
        body.innerHTML = '<div class="loading"><div class="loader"></div>Loading...</div>';

        if (tab === 'logs') loadLogs();
        else if (tab === 'inspect') loadInspect();
        else if (tab === 'exec') loadExec();
    }

    async function loadLogs(tail = 200) {
        const body = document.getElementById('panelBody');
        try {
            const resp = await fetch(`${BASE()}/api/containers/${currentContainer}/logs?tail=${tail}`);
            const text = await resp.text();
            body.innerHTML = `
                <div class="log-controls">
                    <select onchange="loadLogs(this.value)">
                        <option value="100" ${tail==100?'selected':''}>100 lines</option>
                        <option value="200" ${tail==200?'selected':''}>200 lines</option>
                        <option value="500" ${tail==500?'selected':''}>500 lines</option>
                        <option value="1000" ${tail==1000?'selected':''}>1000 lines</option>
                        <option value="3000" ${tail==3000?'selected':''}>3000 lines</option>
                    </select>
                    <button onclick="loadLogs(${tail})">Refresh</button>
                </div>
                <pre>${escHtml(text)}</pre>`;
            body.scrollTop = body.scrollHeight;
        } catch (e) {
            body.innerHTML = `<pre style="color:var(--red)">Error: ${e.message}</pre>`;
        }
    }

    async function loadInspect() {
        const body = document.getElementById('panelBody');
        try {
            const resp = await fetch(`${BASE()}/api/containers/${currentContainer}/inspect`);
            const d = await resp.json();
            if (!d.ok) { body.innerHTML = `<pre style="color:var(--red)">${d.error}</pre>`; return; }

            let h = '';
            // State
            h += sec('State', tbl({
                'Status': pill(d.state.status),
                'PID': d.state.pid,
                'Started': fmtISO(d.state.started_at),
                'Exit Code': d.state.exit_code,
            }));
            // Container
            h += sec('Container', tbl({
                'ID': d.id,
                'Image': d.image,
                'Created': fmtISO(d.created),
                'Working Dir': d.working_dir || '-',
                'Entrypoint': d.entrypoint ? d.entrypoint.join(' ') : '-',
                'Cmd': d.cmd ? d.cmd.join(' ') : '-',
            }));
            // Networks
            for (const [name, net] of Object.entries(d.networks || {})) {
                h += sec(`Network: ${name}`, tbl({
                    'IP': net.ip, 'Gateway': net.gateway, 'MAC': net.mac
                }));
            }
            // Ports
            if (Object.keys(d.ports || {}).length) {
                const portRows = {};
                for (const [p, binds] of Object.entries(d.ports)) {
                    portRows[p] = binds ? binds.map(b => `${b.host_ip || '0.0.0.0'}:${b.host_port}`).join(', ') : 'not bound';
                }
                h += sec('Ports', tbl(portRows));
            }
            // Mounts
            if (d.mounts && d.mounts.length) {
                const mountRows = {};
                d.mounts.forEach((m, i) => {
                    mountRows[m.dest] = `${m.source} (${m.type}, ${m.rw ? 'rw' : 'ro'})`;
                });
                h += sec('Mounts', tbl(mountRows));
            }
            // Env
            if (d.env && d.env.length) {
                h += sec('Environment', '<pre>' + d.env.map(escHtml).join('\n') + '</pre>');
            }
            // Resources
            h += sec('Resources', tbl({
                'Memory Limit': d.memory_limit ? `${(d.memory_limit/1024/1024).toFixed(0)} MB` : 'unlimited',
                'CPU Shares': d.cpu_shares || 'default',
                'Restart Policy': d.restart_policy?.Name || 'none',
            }));

            body.innerHTML = h;
        } catch (e) {
            body.innerHTML = `<pre style="color:var(--red)">Error: ${e.message}</pre>`;
        }
    }

    async function loadExec() {
        const cmds = ['ps','df','top','env','uname','uptime','ss','ls','whoami','cat-hosts','cat-resolv','ip','free'];
        const body = document.getElementById('panelBody');
        body.innerHTML = `
            <div class="exec-grid" id="execGrid">
                ${cmds.map(c => `<button class="exec-btn" onclick="runExec('${c}',this)">${c}</button>`).join('')}
            </div>
            <div class="exec-output" id="execOutput"><pre style="color:var(--text-tertiary)">Select a command above</pre></div>`;
    }

    async function runExec(cmd, btn) {
        document.querySelectorAll('.exec-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const out = document.getElementById('execOutput');
        out.innerHTML = '<div class="loading"><div class="loader"></div>Running...</div>';
        try {
            const resp = await fetch(`${BASE()}/api/containers/${currentContainer}/exec?cmd=${cmd}`, { method: 'POST' });
            const d = await resp.json();
            if (!d.ok) { out.innerHTML = `<pre style="color:var(--red)">${escHtml(d.error)}</pre>`; return; }
            let result = '';
            if (d.stdout) result += d.stdout;
            if (d.stderr) result += '\n--- stderr ---\n' + d.stderr;
            out.innerHTML = `<div style="font-family:var(--mono);font-size:10px;color:var(--text-tertiary);margin-bottom:6px">$ ${escHtml(d.cmd)} [exit: ${d.exit_code}]</div><pre>${escHtml(result)}</pre>`;
        } catch (e) {
            out.innerHTML = `<pre style="color:var(--red)">Error: ${e.message}</pre>`;
        }
    }

    // Helpers
    function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function sec(label, content) { return `<div class="insp-section"><div class="insp-label">${label}</div>${content}</div>`; }
    function tbl(obj) {
        let h = '<table class="insp-table">';
        for (const [k,v] of Object.entries(obj)) h += `<tr><td>${k}</td><td>${v}</td></tr>`;
        return h + '</table>';
    }
    function pill(status) {
        const cls = status === 'running' ? 'status-running' : 'status-stopped';
        return `<span class="status-pill ${cls}" style="display:inline-flex"><span class="dot"></span>${status}</span>`;
    }
    function fmtISO(iso) {
        if (!iso || iso.startsWith('0001')) return '-';
        try { return new Date(iso).toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' }); } catch { return iso; }
    }

    document.addEventListener('DOMContentLoaded', () => { loadDashboard(); setupAutoRefresh(); });
    if (document.readyState !== 'loading') { loadDashboard(); setupAutoRefresh(); }
    </script>
</body>
</html>
