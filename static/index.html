<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --bg-card: #1e293b;
            --bg-card-hover: #263348;
            --border: #334155;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-dim: #0ea5e9;
            --green: #22c55e;
            --green-dim: rgba(34, 197, 94, 0.15);
            --red: #ef4444;
            --red-dim: rgba(239, 68, 68, 0.15);
            --yellow: #eab308;
            --yellow-dim: rgba(234, 179, 8, 0.15);
            --purple: #a78bfa;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-bottom: 1px solid var(--border);
            padding: 24px 32px;
        }
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header h1 span { font-size: 28px; }
        .header-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 13px;
            color: var(--text-muted);
        }
        .refresh-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
        .auto-refresh {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
        }
        .auto-refresh input { accent-color: var(--accent); }

        /* Stats bar */
        .stats-bar {
            max-width: 1200px;
            margin: 24px auto 0;
            padding: 0 32px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
        }
        .stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value { font-size: 28px; font-weight: 700; margin-top: 4px; }
        .stat-value.accent { color: var(--accent); }
        .stat-value.green { color: var(--green); }

        /* Main content */
        .main { max-width: 1200px; margin: 24px auto; padding: 0 32px; }
        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* App grid */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }
        .app-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        .app-card:hover {
            border-color: var(--accent);
            background: var(--bg-card-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        .app-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        .app-name {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
        }
        .status-badge {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .status-running { background: var(--green-dim); color: var(--green); }
        .status-stopped { background: var(--red-dim); color: var(--red); }
        .status-undeployed { background: var(--yellow-dim); color: var(--yellow); }

        .app-meta {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 13px;
            color: var(--text-muted);
        }
        .meta-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .meta-icon { width: 16px; text-align: center; flex-shrink: 0; }
        .meta-value { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .app-actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        .action-btn {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            transition: all 0.2s;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .action-btn:hover { border-color: var(--accent); color: var(--accent); }
        .action-btn.primary {
            background: var(--accent-dim);
            color: white;
            border-color: var(--accent-dim);
        }
        .action-btn.primary:hover { background: var(--accent); }

        /* Infra section */
        .infra-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 32px;
        }
        .infra-chip {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .dot-green { background: var(--green); }
        .dot-red { background: var(--red); }

        /* Loading */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: var(--text-muted);
        }
        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Footer */
        .footer {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 32px;
            font-size: 12px;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
        }

        /* Harbor link */
        .harbor-link {
            color: var(--purple);
            text-decoration: none;
        }
        .harbor-link:hover { text-decoration: underline; }

        /* Responsive */
        @media (max-width: 768px) {
            .stats-bar { grid-template-columns: repeat(2, 1fr); }
            .app-grid { grid-template-columns: 1fr; }
            .header-content { flex-direction: column; gap: 12px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <h1><span>🚀</span> App Dashboard</h1>
            <div class="header-meta">
                <span id="timestamp"></span>
                <div class="auto-refresh">
                    <input type="checkbox" id="autoRefresh" checked>
                    <label for="autoRefresh">30s 자동새로고침</label>
                </div>
                <button class="refresh-btn" onclick="loadDashboard()">↻ 새로고침</button>
            </div>
        </div>
    </div>

    <div class="stats-bar" id="statsBar">
        <div class="stat-card"><div class="stat-label">배포된 앱</div><div class="stat-value accent" id="statApps">-</div></div>
        <div class="stat-card"><div class="stat-label">실행 중</div><div class="stat-value green" id="statRunning">-</div></div>
        <div class="stat-card"><div class="stat-label">전체 컨테이너</div><div class="stat-value" id="statTotal">-</div></div>
        <div class="stat-card"><div class="stat-label">Harbor 이미지</div><div class="stat-value accent" id="statImages">-</div></div>
    </div>

    <div class="main">
        <div id="content">
            <div class="loading"><div class="spinner"></div>대시보드 로딩 중...</div>
        </div>
    </div>

    <div class="footer">
        <span>Powered by Hermes 🤖</span>
        <a href="" class="harbor-link" id="harborLink" target="_blank">Harbor Registry ↗</a>
    </div>

    <script>
    let refreshTimer = null;

    async function loadDashboard() {
        try {
            const base = window.location.pathname.replace(/\/$/, '');
            const resp = await fetch(base + '/api/dashboard');
            const data = await resp.json();
            renderDashboard(data);
        } catch (e) {
            document.getElementById('content').innerHTML = `
                <div class="loading" style="color: var(--red)">⚠️ 대시보드 로딩 실패: ${e.message}</div>`;
        }
    }

    function renderDashboard(data) {
        // Stats
        document.getElementById('statApps').textContent = data.apps.length;
        document.getElementById('statRunning').textContent = data.apps.filter(a => a.status === 'running').length;
        document.getElementById('statTotal').textContent = data.system.total;
        document.getElementById('statImages').textContent = data.apps.length + data.undeployed.length;
        document.getElementById('timestamp').textContent = data.timestamp;
        document.getElementById('harborLink').href = data.harbor_url;

        let html = '';

        // Deployed Apps
        if (data.apps.length > 0) {
            html += `<div class="section-title">📦 배포된 앱 (${data.apps.length})</div>`;
            html += '<div class="app-grid">';
            for (const app of data.apps) {
                const statusClass = app.status === 'running' ? 'status-running' : 'status-stopped';
                const statusText = app.status === 'running' ? 'Running' : 'Stopped';
                const harbor = app.harbor;
                
                html += `
                <div class="app-card">
                    <div class="app-card-header">
                        <div class="app-name">${app.name}</div>
                        <span class="status-badge ${statusClass}">${statusText}</span>
                    </div>
                    <div class="app-meta">
                        <div class="meta-row"><span class="meta-icon">🔗</span><a href="${app.url}" target="_blank" style="color:var(--accent);text-decoration:none">${app.url_path}</a></div>
                        <div class="meta-row"><span class="meta-icon">⏱️</span><span class="meta-value">Uptime: ${app.uptime || 'N/A'}</span></div>
                        <div class="meta-row"><span class="meta-icon">🐳</span><span class="meta-value" title="${app.image}">${truncate(app.image, 45)}</span></div>
                        ${harbor ? `
                        <div class="meta-row"><span class="meta-icon">📦</span><span class="meta-value">${harbor.size_mb}MB · ${harbor.tag_count} tags</span></div>
                        <div class="meta-row"><span class="meta-icon">📅</span><span class="meta-value">Push: ${formatTime(harbor.push_time)}</span></div>
                        ` : ''}
                    </div>
                    <div class="app-actions">
                        <a href="${app.url}" target="_blank" class="action-btn primary">🌐 접속</a>
                        <a href="${data.harbor_url}/harbor/projects/1/repositories/${app.name}" target="_blank" class="action-btn">📦 Harbor</a>
                        <a href="https://github.com/lwh808/${app.name}" target="_blank" class="action-btn">🐙 GitHub</a>
                    </div>
                </div>`;
            }
            html += '</div>';
        }

        // Undeployed images
        if (data.undeployed.length > 0) {
            html += `<div class="section-title">💤 미배포 이미지 (${data.undeployed.length})</div>`;
            html += '<div class="app-grid">';
            for (const img of data.undeployed) {
                html += `
                <div class="app-card" style="opacity: 0.7">
                    <div class="app-card-header">
                        <div class="app-name">${img.name}</div>
                        <span class="status-badge status-undeployed">Not Deployed</span>
                    </div>
                    <div class="app-meta">
                        <div class="meta-row"><span class="meta-icon">📦</span><span>${img.size_mb}MB · ${img.tag_count} tags</span></div>
                        <div class="meta-row"><span class="meta-icon">📅</span><span>Push: ${formatTime(img.push_time)}</span></div>
                    </div>
                </div>`;
            }
            html += '</div>';
        }

        // Infra containers
        if (data.system.infra && data.system.infra.length > 0) {
            html += `<div class="section-title">⚙️ 인프라 컨테이너 (${data.system.infra_count})</div>`;
            html += '<div class="infra-grid">';
            for (const c of data.system.infra) {
                const dotClass = c.status === 'running' ? 'dot-green' : 'dot-red';
                html += `<div class="infra-chip"><span class="dot ${dotClass}"></span>${c.name}</div>`;
            }
            html += '</div>';
        }

        document.getElementById('content').innerHTML = html;
    }

    function truncate(str, len) {
        return str.length > len ? str.substring(0, len) + '...' : str;
    }

    function formatTime(iso) {
        if (!iso) return 'N/A';
        try {
            const d = new Date(iso);
            return d.toLocaleString('ko-KR', { timeZone: 'Asia/Seoul', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        } catch { return iso; }
    }

    // Auto refresh
    function setupAutoRefresh() {
        const cb = document.getElementById('autoRefresh');
        if (refreshTimer) clearInterval(refreshTimer);
        if (cb.checked) {
            refreshTimer = setInterval(loadDashboard, 30000);
        }
        cb.addEventListener('change', () => {
            if (refreshTimer) clearInterval(refreshTimer);
            if (cb.checked) refreshTimer = setInterval(loadDashboard, 30000);
        });
    }

    // Init
    document.addEventListener('DOMContentLoaded', () => {
        loadDashboard();
        setupAutoRefresh();
    });
    // Fallback if DOM already loaded
    if (document.readyState !== 'loading') {
        loadDashboard();
        setupAutoRefresh();
    }
    </script>
</body>
</html>
