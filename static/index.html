<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230ea5e9'/><path d='M30 55L45 70L70 35' stroke='white' stroke-width='10' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #09090b;
            --bg-secondary: #18181b;
            --bg-tertiary: #27272a;
            --bg-elevated: #1c1c1f;
            --border: #2e2e33;
            --border-hover: #3f3f46;
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --text-tertiary: #71717a;
            --accent: #0ea5e9;
            --accent-muted: rgba(14, 165, 233, 0.12);
            --green: #22c55e;
            --green-muted: rgba(34, 197, 94, 0.12);
            --green-subtle: rgba(34, 197, 94, 0.06);
            --red: #ef4444;
            --red-muted: rgba(239, 68, 68, 0.12);
            --amber: #f59e0b;
            --amber-muted: rgba(245, 158, 11, 0.12);
            --radius: 10px;
            --radius-sm: 6px;
            --shadow: 0 1px 2px rgba(0,0,0,0.4);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
            --mono: 'JetBrains Mono', monospace;
            --sans: 'Inter', -apple-system, system-ui, sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 14px; }
        body {
            font-family: var(--sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Top Nav ── */
        .topnav {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(9, 9, 11, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
        }
        .topnav-inner {
            max-width: 1280px;
            margin: 0 auto;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 15px;
            letter-spacing: -0.3px;
        }
        .brand-mark {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .brand-mark svg { width: 16px; height: 16px; }
        .nav-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .nav-time {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text-tertiary);
            padding: 4px 10px;
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }
        .nav-btn {
            height: 32px;
            padding: 0 12px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-size: 12px;
            font-family: var(--sans);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .nav-btn:hover { border-color: var(--border-hover); color: var(--text-primary); }
        .nav-toggle { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-tertiary); }
        .nav-toggle input { accent-color: var(--accent); width: 14px; height: 14px; }

        /* ── Metric Strip ── */
        .metric-strip {
            max-width: 1280px;
            margin: 1.5rem auto 0;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            background: var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .metric {
            background: var(--bg-secondary);
            padding: 1.25rem 1.5rem;
        }
        .metric-label {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 6px;
        }
        .metric-row {
            display: flex;
            align-items: baseline;
            gap: 6px;
        }
        .metric-value {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -1px;
            line-height: 1;
        }
        .metric-unit {
            font-size: 12px;
            color: var(--text-tertiary);
        }
        .metric-value.healthy { color: var(--green); }
        .metric-value.info { color: var(--accent); }

        /* ── Container ── */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1.5rem 2rem 3rem;
        }

        /* ── Section ── */
        .section { margin-bottom: 2rem; }
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }
        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .section-count {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-tertiary);
            background: var(--bg-tertiary);
            padding: 2px 8px;
            border-radius: 4px;
        }

        /* ── App Table ── */
        .app-table {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }
        .app-row {
            display: grid;
            grid-template-columns: 2fr 100px 1.2fr 100px 120px 110px 140px;
            align-items: center;
            padding: 0 1.25rem;
            height: 60px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-secondary);
            transition: background 0.15s;
        }
        .app-row:last-child { border-bottom: none; }
        .app-row:hover { background: var(--bg-elevated); }
        .app-row-head {
            height: 40px;
            background: var(--bg-tertiary);
            font-size: 11px;
            font-weight: 600;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .app-name-cell {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .app-name {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-primary);
        }
        .app-path {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-tertiary);
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            width: fit-content;
        }
        .status-pill .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .status-running {
            background: var(--green-muted);
            color: var(--green);
        }
        .status-running .dot {
            background: var(--green);
            box-shadow: 0 0 6px var(--green);
        }
        .status-stopped {
            background: var(--red-muted);
            color: var(--red);
        }
        .status-stopped .dot { background: var(--red); }
        .status-idle {
            background: var(--amber-muted);
            color: var(--amber);
        }
        .status-idle .dot { background: var(--amber); }

        .app-image {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-tertiary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .app-size {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text-secondary);
        }
        .app-uptime {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text-secondary);
        }
        .app-actions-cell {
            display: flex;
            gap: 6px;
            justify-content: flex-end;
        }
        .link-btn {
            height: 28px;
            padding: 0 10px;
            border-radius: var(--radius-sm);
            font-size: 11px;
            font-weight: 500;
            font-family: var(--sans);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            transition: all 0.15s;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            background: transparent;
        }
        .link-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-muted);
        }
        .link-btn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        .link-btn.primary:hover {
            background: #0284c7;
        }

        /* ── Infra Grid ── */
        .infra-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .infra-chip {
            padding: 5px 12px;
            border-radius: var(--radius-sm);
            font-family: var(--mono);
            font-size: 11px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: border-color 0.15s;
        }
        .infra-chip:hover { border-color: var(--border-hover); }
        .infra-chip .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }
        .dot-on { background: var(--green); box-shadow: 0 0 4px rgba(34,197,94,0.4); }
        .dot-off { background: var(--red); }

        /* ── Control Buttons ── */
        .ctrl-group {
            display: flex;
            gap: 4px;
        }
        .ctrl-btn {
            height: 28px;
            width: 28px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-tertiary);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            position: relative;
        }
        .ctrl-btn:hover {
            border-color: var(--border-hover);
            color: var(--text-primary);
            background: var(--bg-tertiary);
        }
        .ctrl-btn.ctrl-stop:hover { border-color: var(--red); color: var(--red); background: var(--red-muted); }
        .ctrl-btn.ctrl-start:hover { border-color: var(--green); color: var(--green); background: var(--green-muted); }
        .ctrl-btn.ctrl-restart:hover { border-color: var(--amber); color: var(--amber); background: var(--amber-muted); }
        .ctrl-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .ctrl-btn:disabled:hover { border-color: var(--border); color: var(--text-tertiary); background: transparent; }
        .ctrl-btn svg { width: 14px; height: 14px; }
        .ctrl-btn .spinner-sm {
            width: 12px; height: 12px;
            border: 1.5px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        .ctrl-tooltip {
            position: absolute;
            bottom: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 4px;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s;
        }
        .ctrl-btn:hover .ctrl-tooltip { opacity: 1; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 10px 18px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 500;
            z-index: 100;
            animation: slideUp 0.3s ease;
            border: 1px solid;
        }
        .toast-ok { background: var(--green-muted); color: var(--green); border-color: rgba(34,197,94,0.3); }
        .toast-err { background: var(--red-muted); color: var(--red); border-color: rgba(239,68,68,0.3); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ── Undeployed ── */
        .undeployed-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 12px;
        }
        .undeployed-card {
            background: var(--bg-secondary);
            border: 1px dashed var(--border);
            border-radius: var(--radius);
            padding: 1rem 1.25rem;
        }
        .undeployed-name {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }
        .undeployed-meta {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-tertiary);
            line-height: 1.6;
        }

        /* ── Loading ── */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 240px;
            color: var(--text-tertiary);
            font-size: 13px;
        }
        .loader {
            width: 18px;
            height: 18px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-right: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Footer ── */
        .footer {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1rem 2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: var(--text-tertiary);
            border-top: 1px solid var(--border);
        }
        .footer a {
            color: var(--text-tertiary);
            text-decoration: none;
            transition: color 0.15s;
        }
        .footer a:hover { color: var(--accent); }

        /* ── Responsive ── */
        @media (max-width: 900px) {
            .metric-strip { grid-template-columns: repeat(2, 1fr); }
            .app-row { grid-template-columns: 1.5fr 80px 1fr 120px; height: auto; padding: 12px 16px; }
            .app-row-head .hide-mobile, .app-row .hide-mobile { display: none; }
        }
        @media (max-width: 600px) {
            .metric-strip { grid-template-columns: 1fr 1fr; }
            .app-row { grid-template-columns: 1fr 80px; }
            .topnav { padding: 0 1rem; }
            .container, .footer { padding-left: 1rem; padding-right: 1rem; }
        }
    </style>
</head>
<body>
    <nav class="topnav">
        <div class="topnav-inner">
            <div class="brand">
                <div class="brand-mark">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7" rx="1"/>
                        <rect x="14" y="3" width="7" height="7" rx="1"/>
                        <rect x="3" y="14" width="7" height="7" rx="1"/>
                        <rect x="14" y="14" width="7" height="7" rx="1"/>
                    </svg>
                </div>
                Dashboard
            </div>
            <div class="nav-actions">
                <span class="nav-time" id="timestamp">--</span>
                <label class="nav-toggle">
                    <input type="checkbox" id="autoRefresh" checked>
                    Auto 30s
                </label>
                <button class="nav-btn" onclick="loadDashboard()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12a9 9 0 11-2.636-6.364"/><polyline points="21 3 21 9 15 9"/></svg>
                    Refresh
                </button>
            </div>
        </div>
    </nav>

    <div class="metric-strip" id="metricStrip">
        <div class="metric"><div class="metric-label">Deployed</div><div class="metric-row"><span class="metric-value info" id="mApps">-</span></div></div>
        <div class="metric"><div class="metric-label">Running</div><div class="metric-row"><span class="metric-value healthy" id="mRunning">-</span><span class="metric-unit">healthy</span></div></div>
        <div class="metric"><div class="metric-label">Containers</div><div class="metric-row"><span class="metric-value" id="mTotal">-</span><span class="metric-unit">total</span></div></div>
        <div class="metric"><div class="metric-label">Harbor Images</div><div class="metric-row"><span class="metric-value info" id="mImages">-</span><span class="metric-unit">repos</span></div></div>
    </div>

    <div class="container" id="content">
        <div class="loading"><div class="loader"></div>Loading dashboard...</div>
    </div>

    <div class="footer">
        <span>Hermes Platform</span>
        <a href="" id="harborLink" target="_blank">Harbor Registry</a>
    </div>

    <script>
    let refreshTimer = null;

    async function loadDashboard() {
        try {
            const base = window.location.pathname.replace(/\/$/, '');
            const resp = await fetch(base + '/api/dashboard');
            const data = await resp.json();
            render(data);
        } catch (e) {
            document.getElementById('content').innerHTML =
                `<div class="loading" style="color:var(--red)">Failed to load: ${e.message}</div>`;
        }
    }

    function render(data) {
        document.getElementById('mApps').textContent = data.apps.length;
        document.getElementById('mRunning').textContent = data.apps.filter(a => a.status === 'running').length;
        document.getElementById('mTotal').textContent = data.system.total;
        document.getElementById('mImages').textContent = data.apps.length + data.undeployed.length;
        document.getElementById('timestamp').textContent = data.timestamp;
        document.getElementById('harborLink').href = data.harbor_url;

        let h = '';

        // ── Apps Table ──
        if (data.apps.length) {
            h += `<div class="section">
                <div class="section-header">
                    <span class="section-title">Deployed Applications</span>
                    <span class="section-count">${data.apps.length}</span>
                </div>
                <div class="app-table">
                    <div class="app-row app-row-head">
                        <div>Application</div>
                        <div>Status</div>
                        <div class="hide-mobile">Image</div>
                        <div class="hide-mobile">Size</div>
                        <div>Uptime</div>
                        <div>Controls</div>
                        <div></div>
                    </div>`;

            for (const app of data.apps) {
                const sc = app.status === 'running' ? 'status-running' : 'status-stopped';
                const st = app.status === 'running' ? 'Running' : 'Stopped';
                const hb = app.harbor;
                const sizeText = hb ? `${hb.size_mb} MB` : '-';
                const imgShort = app.image.split('/').pop();

                h += `
                <div class="app-row">
                    <div class="app-name-cell">
                        <span class="app-name">${app.name}</span>
                        <span class="app-path">${app.url_path}</span>
                    </div>
                    <div><span class="status-pill ${sc}"><span class="dot"></span>${st}</span></div>
                    <div class="app-image hide-mobile" title="${app.image}">${imgShort}</div>
                    <div class="app-size hide-mobile">${sizeText}</div>
                    <div class="app-uptime">${app.uptime || '-'}</div>
                    <div class="ctrl-group">
                        <button class="ctrl-btn ctrl-stop" onclick="ctrlContainer('${app.container}','stop',this)" ${app.status !== 'running' ? 'disabled' : ''}>
                            <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
                            <span class="ctrl-tooltip">Stop</span>
                        </button>
                        <button class="ctrl-btn ctrl-start" onclick="ctrlContainer('${app.container}','start',this)" ${app.status === 'running' ? 'disabled' : ''}>
                            <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="8,5 19,12 8,19"/></svg>
                            <span class="ctrl-tooltip">Start</span>
                        </button>
                        <button class="ctrl-btn ctrl-restart" onclick="ctrlContainer('${app.container}','restart',this)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12a9 9 0 11-2.636-6.364"/><polyline points="21 3 21 9 15 9"/></svg>
                            <span class="ctrl-tooltip">Restart</span>
                        </button>
                    </div>
                    <div class="app-actions-cell">
                        <a href="${app.url}" target="_blank" class="link-btn primary">Open</a>
                        <a href="${data.harbor_url}/harbor/projects/1/repositories/${app.harbor_name || app.name}" target="_blank" class="link-btn">Harbor</a>
                        <a href="https://github.com/lwh808/${app.name}" target="_blank" class="link-btn">Git</a>
                    </div>
                </div>`;
            }
            h += '</div></div>';
        }

        // ── Undeployed ──
        if (data.undeployed.length) {
            h += `<div class="section">
                <div class="section-header">
                    <span class="section-title">Undeployed Images</span>
                    <span class="section-count">${data.undeployed.length}</span>
                </div>
                <div class="undeployed-grid">`;
            for (const img of data.undeployed) {
                h += `
                <div class="undeployed-card">
                    <div class="undeployed-name">${img.name}</div>
                    <div class="undeployed-meta">
                        ${img.size_mb} MB &middot; ${img.tag_count} tags<br>
                        pushed ${fmtTime(img.push_time)}
                    </div>
                </div>`;
            }
            h += '</div></div>';
        }

        // ── Infra ──
        if (data.system.infra && data.system.infra.length) {
            h += `<div class="section">
                <div class="section-header">
                    <span class="section-title">Infrastructure</span>
                    <span class="section-count">${data.system.infra_count}</span>
                </div>
                <div class="infra-grid">`;
            for (const c of data.system.infra) {
                const dc = c.status === 'running' ? 'dot-on' : 'dot-off';
                h += `<div class="infra-chip"><span class="dot ${dc}"></span>${c.name}</div>`;
            }
            h += '</div></div>';
        }

        document.getElementById('content').innerHTML = h;
    }

    function fmtTime(iso) {
        if (!iso) return '-';
        try {
            return new Date(iso).toLocaleString('ko-KR', {
                timeZone: 'Asia/Seoul', month: 'short', day: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        } catch { return iso; }
    }

    function setupAutoRefresh() {
        const cb = document.getElementById('autoRefresh');
        const go = () => {
            if (refreshTimer) clearInterval(refreshTimer);
            if (cb.checked) refreshTimer = setInterval(loadDashboard, 30000);
        };
        cb.addEventListener('change', go);
        go();
    }

    // ── Container Control ──
    async function ctrlContainer(name, action, btn) {
        const origHTML = btn.innerHTML;
        btn.innerHTML = '<span class="spinner-sm"></span>';
        btn.disabled = true;

        try {
            const base = window.location.pathname.replace(/\/$/, '');
            const resp = await fetch(`${base}/api/containers/${name}/${action}`, { method: 'POST' });
            const data = await resp.json();
            if (data.ok) {
                toast(`${name}: ${action} OK`, false);
                setTimeout(loadDashboard, 500);
            } else {
                toast(`${name}: ${data.error}`, true);
                btn.innerHTML = origHTML;
                btn.disabled = false;
            }
        } catch (e) {
            toast(`Error: ${e.message}`, true);
            btn.innerHTML = origHTML;
            btn.disabled = false;
        }
    }

    function toast(msg, isErr) {
        const el = document.createElement('div');
        el.className = `toast ${isErr ? 'toast-err' : 'toast-ok'}`;
        el.textContent = msg;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 3000);
    }

    document.addEventListener('DOMContentLoaded', () => { loadDashboard(); setupAutoRefresh(); });
    if (document.readyState !== 'loading') { loadDashboard(); setupAutoRefresh(); }
    </script>
</body>
</html>
